        content: "Right -- sear first for Maillard, then low and slow in liquid to break down collagen into gelatin. That's why tough cuts work best for braising. How does pressure cooking change the braising equation?"
      - role: assistant
        content: "[MODEL RESPONSE]"
      - role: user
        content: "Higher pressure raises the boiling point, so collagen conversion happens faster -- a 3-hour braise becomes 45 minutes. What about sous vide? That seems like the opposite approach."
