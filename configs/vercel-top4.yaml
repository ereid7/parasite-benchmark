# PARASITE — Top 4 Providers Benchmark
# Via Vercel AI Gateway (OpenAI-compatible)

name: vercel-top4
description: "Cross-provider PARASITE run — OpenAI, Anthropic, Google, xAI"

models:
  - openai/gpt-4o
  - openai/gpt-4o-mini
  - anthropic/claude-sonnet-4-6
  - anthropic/claude-haiku-3-5
  - google/gemini-2.0-flash
  - google/gemini-2.0-pro
  - xai/grok-3
  - xai/grok-3-mini

judge:
  model: openai/gpt-4o
  runs: 1

categories: [A, B, E, F, G, H, I, K]

# Equal weights across all 8 categories
weights:
  A: 0.125
  B: 0.125
  E: 0.125
  F: 0.125
  G: 0.125
  H: 0.125
  I: 0.125
  K: 0.125

concurrency: 1
include_canary: false
