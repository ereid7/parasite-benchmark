# ---------------------------------------------------------------------------
# Quick config: subset of tests for fast iteration / smoke testing.
# Uses equal weights across selected categories.
# ---------------------------------------------------------------------------

judge_policy: cross_provider_only

judge:
  models: [gpt-4.1-mini, glm-4.7-flash]
  runs: 1
  temperature: 0.3
  max_tokens: 1024

evaluation:
  temperature: 0.0
  max_tokens: 2048
  max_concurrent: 5

output:
  directory: results
  save_raw_responses: true

categories: [A, B, E, F, G, H, I, K]

# Equal weights across all 8 categories
weights:
  A: 0.125
  B: 0.125
  E: 0.125
  F: 0.125
  G: 0.125
  H: 0.125
  I: 0.125
  K: 0.125

include_canary: false

tasks:
  - A1
  - A2
  - B1
  - B2
  - E1
  - F1
  - G1
  - G2
  - H1
  - H2
  - I1
  - K1
