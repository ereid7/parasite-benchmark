# ---------------------------------------------------------------------------
# Cross-Judge Rule: The judge model MUST be from a different provider than
# the model being tested. Same-provider judging causes self-enhancement bias
# (up to 3.7x score variation observed). Examples:
#   - Testing GPT models  → use Claude Haiku or Gemini as judge
#   - Testing Claude models → use GPT-4.1-mini or GLM as judge
#   - Testing Gemini models → use Claude Haiku or GPT-4.1-mini as judge
# The CLI enforces this automatically and will exit with an error if violated.
# ---------------------------------------------------------------------------

judge_policy: cross_provider_only

judge:
  models: [gpt-4o, claude-3-5-haiku-20241022]
  weights:
    gpt-4o: 0.6
    claude-3-5-haiku-20241022: 0.4
  runs: 1
  temperature: 0.3
  max_tokens: 1024

evaluation:
  temperature: 0.0
  max_tokens: 2048
  max_concurrent: 5

output:
  directory: results
  save_raw_responses: true

categories: [A, B, G, H]

weights:
  A: 0.25
  B: 0.35
  G: 0.20
  H: 0.20

include_canary: false

tasks:
  - A1
  - A2
  - B1
  - B2
  - G1
  - G2
  - H1
  - H2
